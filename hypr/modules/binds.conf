# APPLICATIONS

    bind = SUPER, C, exec, $terminal
    bind = SUPER, M, exit
    bind = SUPER, E, exec, $fileManager
    bind = SUPER, B, exec, $browser
    bind = SUPER, L, exec, hyprlock
    bind = SUPER, R, exec, $menu
    bind = , PRINT, exec, $screenshot # PRINT - PrintSceen
    bind = SUPER, N, exec, $HYPRSCRIPTS/exec_once.sh wlogout "wlogout"
    bind = SUPER, Y, exec, yandex-music
    bind = SUPER, GRAVE, exec, bash ~/Scripts/take-git-token.sh # GRAVE - '`'
    bind = SUPER, T, exec, code
    bind = SUPER, Z, exec, $fileManager $BOOKS_PATH

# WINDOWS_MANAGEMENT

    bind = SUPER, Q, killactive
    bind = SUPER, F, fullscreen
    bind = SUPER, V, togglefloating

    # scroll through existing workspaces with mainMod + scrollv
    bind = SUPER, mouse_down, workspace, e+1
    bind = SUPER, mouse_up, workspace, e-1

    # Switch workspaces
    bind = SUPER, 2, workspace, e+1
    bind = SUPER, 3, workspace, e-1

    # Move/resize windows with mainMod + LMB/RMB and dragging
    bindm = SUPER, mouse:272, movewindow
    bindm = SUPER, mouse:273, resizewindow

# AUDIO

    # Laptop multimedia keys for volume and LCD brightness
    bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
    bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
    bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
    bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
    bindel = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
    bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

    # Requires playerctl (default)
    bindl = , XF86AudioNext, exec, playerctl next
    bindl = , XF86AudioPause, exec, playerctl play-pause
    bindl = , XF86AudioPlay, exec, playerctl play-pause
    bindl = , XF86AudioPrev, exec, playerctl previous

    # Requires playerctl (cross platform)
    bindl = SUPER, PERIOD, exec, playerctl next
    bindl = SUPER, SLASH, exec, playerctl play-pause
    bindl = SUPER, COMMA, exec, playerctl previous
