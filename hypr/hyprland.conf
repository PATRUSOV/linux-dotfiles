# VARIABLES

    # DEFAULT_PROGRAMS

        $terminal = kitty
        $fileManager = thunar
        $menu = $HYPRSCRIPTS/exec_once.sh wofi "wofi --show drun"
        $browser = firefox
        $screenshot = hyprshot -m region
        $musicapp = yandex-music

    # PATHS

        $BOOKS_PATH = ~/Books/

# AUTOSTART

    exec-once = hyprctl dispatch workspace name:main
    exec-once = waybar & hyprpaper
    exec-once = mako
    exec-once = waypaper --restore
    exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
    exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# APPEARANCE

    # prohibit scaling for applications running via xwayland
    xwayland:force_zero_scaling = true


    general {
        gaps_in = 4
        gaps_out = 14

        border_size = 2

        col.active_border = rgba(110202cc) rgba(170303cc) 45deg
        col.inactive_border = rgba(595959aa)

        # set to true enable resizing windows by clicking and dragging on borders and gaps
        resize_on_border = false

        # please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
        allow_tearing = false

        layout = dwindle
    }

    decoration {
        rounding = 3
        rounding_power = 4

        # change transparency of focused and unfocused windows
        active_opacity = 1.0
        inactive_opacity = 1.0

        shadow {
            enabled = false

            range = 4
            render_power = 3
            color = rgba(1a1a1aee)
        }

        blur {
            enabled = false

            size = 3
            passes = 1
            vibrancy = 0.1696
        }
    }

    animations {
        enabled = yes

        bezier = easeOutQuint, 0.23, 1, 0.32, 1
        bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
        bezier = linear, 0, 0, 1, 1
        bezier = almostLinear, 0.5, 0.5, 0.75, 1.0
        bezier = quick, 0.15, 0, 0.1, 1

        animation = global, 1, 10, default
        animation = border, 1, 5.39, easeOutQuint
        animation = windows, 1, 4.79, easeOutQuint
        animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
        animation = windowsOut, 1, 1.49, linear, popin 87%
        animation = fadeIn, 1, 1.73, almostLinear
        animation = fadeOut, 1, 1.46, almostLinear
        animation = fade, 1, 3.03, quick
        animation = layers, 1, 3.81, easeOutQuint
        animation = layersIn, 1, 4, easeOutQuint, fade
        animation = layersOut, 1, 1.5, linear, fade
        animation = fadeLayersIn, 1, 1.79, almostLinear
        animation = fadeLayersOut, 1, 1.39, almostLinear
        animation = workspaces, 1, 1.94, almostLinear, fade
        animation = workspacesIn, 1, 1.21, almostLinear, fade
        animation = workspacesOut, 1, 1.94, almostLinear, fade
    }

    # see https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    master:new_status = master

    # see https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    dwindle {
        pseudotile = true # master switch for pseudotiling
        preserve_split = true # you probably want this
    }

    # see https://wiki.hyprland.org/Configuring/Variables/#misc
    misc {
        force_default_wallpaper = false # Set to 0 or 1 to disable the anime mascot wallpapers
        disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
        vfr = true
    }

# INPUT

    input {
        kb_layout = us, ru
        kb_options = grp:caps_toggle

        repeat_rate = 50   # characters in seconds when the key is pressed
        repeat_delay = 500 # delay before pressing the key (ms)
        sensitivity = 0.4  # -1.0 - 1.0, 0 means no modification.
        follow_mouse = true

        touchpad:natural_scroll = false
    }

    device {
        name = epic-mouse-v1
        sensitivity = 0.1
    }

# ADDICTIONS

    debug:damage_tracking = 2 # notebook batery optimization

# IMPORTS

    source = ./modules/binds.conf
    source = ./modules/env.conf
    source = ./modules/monitors.conf
    source = ./modules/rules.conf
    source = ./modules/workspaces.conf
